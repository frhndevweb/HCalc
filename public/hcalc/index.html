<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HCalc — Premium Modern Calculator</title>
  <meta name="description" content="HCalc — kalkulator premium modern dengan mode scientific, programmer, graph, statistics, voice, dan converter." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="icon" type="image/svg+xml" href="./assets/images/logo.svg" />
  <link rel="stylesheet" href="./assets/css/themes.css" />
  <link rel="stylesheet" href="./assets/css/animations.css" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body class="min-h-screen overflow-x-hidden">
  <!-- Floating background shapes -->
  <div class="bg-shapes" aria-hidden="true">
    <span class="shape shape-1"></span>
    <span class="shape shape-2"></span>
    <span class="shape shape-3"></span>
    <span class="shape shape-4"></span>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-5 right-5 z-[100] flex flex-col gap-3"></div>

  <main class="relative z-10 min-h-screen w-full px-4 py-6 md:px-8 md:py-10 flex flex-col items-center">

    <!-- Header -->
    <header class="w-full max-w-6xl flex items-center justify-between mb-6 animate-fade-down">
      <div class="flex items-center gap-3">
        <div class="logo-badge">
          <img src="./assets/images/logo.svg" alt="HCalc Logo" class="w-7 h-7" />
        </div>
        <div>
          <h1 class="text-xl md:text-2xl font-bold tracking-tight text-fg">HCalc</h1>
          <p class="text-xs text-fg-muted -mt-0.5">Premium Modern Calculator</p>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button id="voice-btn" class="icon-btn" title="Voice Calculator">
          <i class="fa fa-microphone"></i>
        </button>
        <button id="history-toggle" class="icon-btn" title="History">
          <i class="fa fa-history"></i>
        </button>
        <button id="theme-toggle" class="icon-btn" title="Toggle Dark/Light">
          <i class="fa fa-moon-o"></i>
        </button>
        <div class="relative">
          <button id="palette-toggle" class="icon-btn" title="Themes">
            <i class="fa fa-paint-brush"></i>
          </button>
          <div id="palette-menu" class="palette-menu hidden">
            <button data-palette="blue" class="palette-chip" style="--c:#3b82f6"><span></span>Blue Neon</button>
            <button data-palette="purple" class="palette-chip" style="--c:#a855f7"><span></span>Purple Galaxy</button>
            <button data-palette="emerald" class="palette-chip" style="--c:#10b981"><span></span>Emerald</button>
            <button data-palette="orange" class="palette-chip" style="--c:#f97316"><span></span>Orange Fire</button>
            <button data-palette="rose" class="palette-chip" style="--c:#f43f5e"><span></span>Rose Pink</button>
          </div>
        </div>
      </div>
    </header>

    <!-- Mode Tabs -->
    <nav class="w-full max-w-6xl mb-4 animate-fade-down">
      <div class="glass-card p-1.5 flex gap-1 overflow-x-auto no-scrollbar">
        <button class="mode-tab active" data-mode="basic"><i class="fa fa-calculator"></i> Basic</button>
        <button class="mode-tab" data-mode="scientific"><i class="fa fa-flask"></i> Scientific</button>
        <button class="mode-tab" data-mode="programmer"><i class="fa fa-code"></i> Programmer</button>
        <button class="mode-tab" data-mode="converter"><i class="fa fa-exchange"></i> Converter</button>
        <button class="mode-tab" data-mode="graph"><i class="fa fa-line-chart"></i> Graph</button>
        <button class="mode-tab" data-mode="stats"><i class="fa fa-bar-chart"></i> Statistics</button>
      </div>
    </nav>

    <!-- Workspace -->
    <section class="w-full max-w-6xl grid lg:grid-cols-[1fr_340px] gap-4">
      <!-- Calculator main -->
      <div class="glass-card p-4 md:p-6 animate-fade-up">

        <!-- Display -->
        <div class="display-wrap">
          <div id="expression" class="expression">0</div>
          <div id="result" class="result">0</div>
          <div class="memory-indicator" id="memory-indicator" title="Memory active">M</div>
        </div>

        <!-- BASIC + SCIENTIFIC -->
        <div id="panel-basic" class="panel">
          <div id="scientific-row" class="grid grid-cols-5 gap-2 mb-2 hidden">
            <button class="btn btn-sci" data-fn="sin">sin</button>
            <button class="btn btn-sci" data-fn="cos">cos</button>
            <button class="btn btn-sci" data-fn="tan">tan</button>
            <button class="btn btn-sci" data-fn="log">log</button>
            <button class="btn btn-sci" data-fn="ln">ln</button>
            <button class="btn btn-sci" data-fn="asin">sin⁻¹</button>
            <button class="btn btn-sci" data-fn="acos">cos⁻¹</button>
            <button class="btn btn-sci" data-fn="atan">tan⁻¹</button>
            <button class="btn btn-sci" data-fn="sqrt">√</button>
            <button class="btn btn-sci" data-fn="cbrt">∛</button>
            <button class="btn btn-sci" data-insert="^">xʸ</button>
            <button class="btn btn-sci" data-fn="fact">x!</button>
            <button class="btn btn-sci" data-insert="%">mod</button>
            <button class="btn btn-sci" data-fn="abs">|x|</button>
            <button class="btn btn-sci" data-fn="rand">rnd</button>
            <button class="btn btn-sci" data-insert="π">π</button>
            <button class="btn btn-sci" data-insert="e">e</button>
            <button class="btn btn-sci" data-insert="(">(</button>
            <button class="btn btn-sci" data-insert=")">)</button>
            <button class="btn btn-sci" data-action="ans">Ans</button>
          </div>

          <!-- Memory row -->
          <div class="grid grid-cols-5 gap-2 mb-2">
            <button class="btn btn-mem" data-mem="MC">MC</button>
            <button class="btn btn-mem" data-mem="MR">MR</button>
            <button class="btn btn-mem" data-mem="M+">M+</button>
            <button class="btn btn-mem" data-mem="M-">M−</button>
            <button class="btn btn-mem" data-mem="MS">MS</button>
          </div>

          <!-- Main keypad -->
          <div class="grid grid-cols-4 gap-2">
            <button class="btn btn-fn" data-action="ac">AC</button>
            <button class="btn btn-fn" data-action="del"><i class="fa fa-long-arrow-left"></i></button>
            <button class="btn btn-fn" data-insert="%">%</button>
            <button class="btn btn-op" data-insert="/">÷</button>

            <button class="btn btn-num" data-num="7">7</button>
            <button class="btn btn-num" data-num="8">8</button>
            <button class="btn btn-num" data-num="9">9</button>
            <button class="btn btn-op" data-insert="*">×</button>

            <button class="btn btn-num" data-num="4">4</button>
            <button class="btn btn-num" data-num="5">5</button>
            <button class="btn btn-num" data-num="6">6</button>
            <button class="btn btn-op" data-insert="-">−</button>

            <button class="btn btn-num" data-num="1">1</button>
            <button class="btn btn-num" data-num="2">2</button>
            <button class="btn btn-num" data-num="3">3</button>
            <button class="btn btn-op" data-insert="+">+</button>

            <button class="btn btn-num" data-insert="(">(</button>
            <button class="btn btn-num" data-num="0">0</button>
            <button class="btn btn-num" data-insert=".">.</button>
            <button class="btn btn-eq" data-action="eq">=</button>
          </div>
        </div>

        <!-- PROGRAMMER -->
        <div id="panel-programmer" class="panel hidden">
          <div class="grid gap-2 mb-3">
            <div class="prog-row"><span class="prog-label">HEX</span><span id="prog-hex" class="prog-val">0</span></div>
            <div class="prog-row"><span class="prog-label">DEC</span><span id="prog-dec" class="prog-val">0</span></div>
            <div class="prog-row"><span class="prog-label">OCT</span><span id="prog-oct" class="prog-val">0</span></div>
            <div class="prog-row"><span class="prog-label">BIN</span><span id="prog-bin" class="prog-val">0</span></div>
          </div>
          <div class="flex gap-2 mb-2">
            <select id="prog-base" class="select-glass">
              <option value="10">DEC</option>
              <option value="16">HEX</option>
              <option value="8">OCT</option>
              <option value="2">BIN</option>
            </select>
            <input id="prog-input" class="input-glass flex-1" placeholder="Enter number..." />
            <button id="prog-convert" class="btn btn-eq !py-2 !px-4">Convert</button>
          </div>
        </div>

        <!-- CONVERTER -->
        <div id="panel-converter" class="panel hidden">
          <div class="grid gap-3">
            <select id="conv-type" class="select-glass">
              <option value="length">Panjang</option>
              <option value="weight">Berat</option>
              <option value="temp">Suhu</option>
              <option value="speed">Kecepatan</option>
              <option value="time">Waktu</option>
            </select>
            <div class="grid grid-cols-[1fr_auto_1fr] items-center gap-2">
              <div class="flex flex-col gap-2">
                <select id="conv-from" class="select-glass"></select>
                <input id="conv-from-val" type="number" class="input-glass" value="1" />
              </div>
              <i class="fa fa-arrow-right text-fg-muted"></i>
              <div class="flex flex-col gap-2">
                <select id="conv-to" class="select-glass"></select>
                <input id="conv-to-val" type="number" class="input-glass" readonly />
              </div>
            </div>
          </div>
        </div>

        <!-- GRAPH -->
        <div id="panel-graph" class="panel hidden">
          <div class="flex gap-2 mb-3 flex-wrap">
            <input id="graph-input" class="input-glass flex-1 min-w-[180px]" placeholder="e.g. sin(x), x^2, x^3" />
            <button id="graph-plot" class="btn btn-eq !py-2 !px-4">Plot</button>
            <button id="graph-clear" class="btn btn-fn !py-2 !px-4">Clear</button>
          </div>
          <div class="canvas-wrap">
            <canvas id="graph-canvas" width="800" height="420"></canvas>
          </div>
        </div>

        <!-- STATS -->
        <div id="panel-stats" class="panel hidden">
          <textarea id="stats-input" class="input-glass w-full h-28" placeholder="Masukkan angka pisahkan koma. Contoh: 12, 5, 8, 9, 3"></textarea>
          <button id="stats-calc" class="btn btn-eq !py-2 !px-4 mt-3">Calculate</button>
          <div id="stats-output" class="grid grid-cols-2 md:grid-cols-3 gap-2 mt-3"></div>
        </div>

      </div>

      <!-- History panel -->
      <aside id="history-panel" class="glass-card p-4 animate-fade-up flex flex-col h-[600px] lg:h-auto">
        <div class="flex items-center justify-between mb-3">
          <h2 class="font-semibold text-fg flex items-center gap-2"><i class="fa fa-clock-o"></i> History</h2>
          <div class="flex gap-1">
            <button id="history-export" class="icon-btn-sm" title="Export"><i class="fa fa-download"></i></button>
            <button id="history-clear" class="icon-btn-sm" title="Clear all"><i class="fa fa-trash"></i></button>
          </div>
        </div>
        <input id="history-search" class="input-glass mb-3" placeholder="Search history..." />
        <div id="history-list" class="flex-1 overflow-y-auto pr-1 flex flex-col gap-2">
          <p class="text-fg-muted text-sm text-center py-8">No history yet</p>
        </div>
      </aside>
    </section>

    <footer class="text-center text-xs text-fg-muted mt-6">
      © <span id="year"></span> HCalc — Crafted with precision by <a href="https://github.com/frhndevweb">@Esperessos</a>.
    </footer>
  </main>

  <script type="module" src="./assets/js/app.js"></script>
</body>
</html>
